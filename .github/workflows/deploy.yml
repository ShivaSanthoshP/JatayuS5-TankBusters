name: CI / CD — Deploy to AWS EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent concurrent deploys; new pushes cancel in-flight CI but never
# cancel an already-running deploy (cancel-in-progress: false on deploy).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── CI: runs on every push and every PR ─────────────────────────
  ci:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type-check & build frontend
        working-directory: frontend
        run: npm run build
        # Fails fast on any TypeScript error before we touch production.

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # Upload the validated build artifact so the deploy job reuses
      # exactly what CI produced instead of rebuilding from scratch.
      - name: Upload frontend build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Deploy: runs only when a commit lands on main ───────────────
  # This covers both direct pushes and merged pull requests
  # (a merge creates a push event on main).
  deploy:
    name: Deploy to EC2
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # Sync backend code — never overwrites the DB, chroma store, .env,
      # or runtime_settings.json so user data and secrets survive deploys.
      - name: Sync backend code
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '.env' \
            --exclude 'itops.db' \
            --exclude 'chroma_db/' \
            --exclude 'runtime_settings.json' \
            backend/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/itops/backend/"

      - name: Sync frontend build
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/itops/frontend/dist/"

      # Stage the nginx config to a user-writable location on EC2; the SSH
      # step below copies it into /etc/nginx with sudo (narrowly allow-listed
      # in /etc/sudoers.d/itops).
      - name: Sync nginx config
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p /opt/itops/deployment"
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deployment/nginx.conf \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/itops/deployment/nginx.conf"

      - name: Install Python deps & restart services
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'ENDSSH'
          set -euo pipefail

          echo "=== Activating virtualenv ==="
          source /opt/itops/venv/bin/activate

          echo "=== Upgrading pip and installing dependencies ==="
          cd /opt/itops/backend
          pip install -q --upgrade pip
          pip install -q -r requirements.txt

          echo "=== Restarting backend service ==="
          sudo systemctl restart itops-backend

          echo "=== Applying nginx config ==="
          sudo /usr/bin/cp /opt/itops/deployment/nginx.conf /etc/nginx/conf.d/itops.conf
          sudo nginx -t && sudo systemctl reload nginx

          echo ""
          echo "=== Backend service status ==="
          sudo systemctl status itops-backend --no-pager -l
          ENDSSH

      - name: Health check
        run: |
          echo "Waiting for service to initialise..."
          sleep 8
          HTTP_CODE=$(curl -s -o /tmp/health.json \
            -w "%{http_code}" \
            "http://${{ secrets.EC2_HOST }}/health")
          echo "HTTP $HTTP_CODE"
          python3 -m json.tool /tmp/health.json || cat /tmp/health.json
          if [ "$HTTP_CODE" = "000" ]; then
            echo "ERROR: Could not reach the server."
            exit 1
          fi
          echo "Health check passed — app is running."
