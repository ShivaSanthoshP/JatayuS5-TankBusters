# ── Port 80 — redirect to HTTPS (with health-check + ACME exceptions) ─
# Most requests land on https://, so :80 just redirects up. Two exceptions:
#   • /health  — CI/CD's post-deploy probe hits http://<host>/health
#   • /.well-known/acme-challenge/ — acme.sh webroot renewal (harmless if
#     DNS validation is used; prevents a redirect loop otherwise)
server {
    listen 80 default_server;
    server_name _;

    location = /health {
        proxy_pass       http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

# ── Port 443 — main HTTPS server ──────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # acme.sh-installed cert (auto-renewed; see ~ec2-user/.acme.sh/).
    ssl_certificate     /etc/nginx/ssl/itops.cer;
    ssl_certificate_key /etc/nginx/ssl/itops.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Serve the built React app
    root /opt/itops/frontend/dist;
    index index.html;

    # gzip the chatty payloads: JS, CSS, JSON, SVG. Bundles drop ~70%
    # over the wire — the biggest single win for cold hard-refresh.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── WebSocket (live metrics stream) ─────────────────────────────
    # Must appear before /api/ so the /ws/ prefix matches first.
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
    }

    # ── FastAPI built-in endpoints ───────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json|health)$ {
        proxy_pass       http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Hashed Vite assets — cache forever ───────────────────────────
    # Filenames are content-hashed (`index-abc123.js`) so a new build
    # always produces a new URL. Eternal cache is safe and lets the
    # second hard-refresh skip the network entirely.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── React Router fallback ────────────────────────────────────────
    # All other paths serve index.html so client-side routing works.
    # index.html is NOT in /assets/, so it stays at the default
    # (short) cache and new deploys roll out promptly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
